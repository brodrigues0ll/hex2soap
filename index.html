<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leitor NFC - SoapAdmin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">

  <div class="bg-gray-800 p-6 rounded-2xl shadow-xl w-full max-w-md text-center space-y-4">
    <h1 class="text-2xl font-bold">Leitor NFC</h1>
    <p class="text-gray-400">Aproxime o crachá do celular</p>

    <button id="startBtn"
      class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded-xl font-semibold w-full">
      Iniciar Leitura NFC
    </button>

    <div class="mt-4 space-y-2 text-left">
      <div>
        <span class="text-gray-400">UID (HEX):</span>
        <div id="hex" class="font-mono text-lg break-all">---</div>
      </div>

      <div>
        <span class="text-gray-400">UID Invertido:</span>
        <div id="reversed" class="font-mono text-lg break-all">---</div>
      </div>

      <div>
        <span class="text-gray-400">SoapAdmin (Decimal):</span>
        <div class="flex items-center gap-2">
          <div id="decimal" class="font-mono text-xl text-green-400 break-all">---</div>
          <button id="copyBtn" title="Copiar"
            class="text-gray-400 hover:text-white transition-colors hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-4 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div id="status" class="text-sm text-gray-400"></div>

    <div class="border-t border-gray-600 pt-4 space-y-2 text-left">
      <p class="text-gray-400 text-sm text-center">Ou digite o HEX manualmente</p>
      <div class="flex gap-2">
        <input id="hexInput" type="text" maxlength="23" placeholder="Ex: 5BD9FF19 ou 5B:D9:FF:19"
          class="flex-1 bg-gray-700 text-white font-mono px-3 py-2 rounded-xl uppercase placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500" />
        <button id="convertBtn"
          class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-xl font-semibold">
          Converter
        </button>
      </div>
    </div>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn')
    const copyBtn = document.getElementById('copyBtn')
    const convertBtn = document.getElementById('convertBtn')
    const hexInput = document.getElementById('hexInput')
    const hexEl = document.getElementById('hex')
    const reversedEl = document.getElementById('reversed')
    const decimalEl = document.getElementById('decimal')
    const statusEl = document.getElementById('status')

    function convertToSoapAdmin(hex) {
      // separa em bytes
      const bytes = hex.match(/.{2}/g)

      // inverte (little endian)
      const reversed = bytes.reverse().join('')

      // decimal
      const decimal = parseInt(reversed, 16)

      return { reversed, decimal }
    }

    function applyConversion(uidHex) {
      if (!/^[0-9A-Fa-f]{2,}$/.test(uidHex) || uidHex.length % 2 !== 0) {
        statusEl.innerText = "HEX inválido. Use somente caracteres hex com número par de dígitos."
        return
      }
      const { reversed, decimal } = convertToSoapAdmin(uidHex.toUpperCase())
      hexEl.innerText = uidHex.toUpperCase()
      reversedEl.innerText = reversed
      decimalEl.innerText = decimal.toString().padStart(10, '0')
      copyBtn.classList.remove('hidden')
      statusEl.innerText = "Convertido manualmente."
    }

    copyBtn.onclick = () => {
      navigator.clipboard.writeText(decimalEl.innerText).then(() => {
        const orig = copyBtn.innerHTML
        copyBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>'
        setTimeout(() => { copyBtn.innerHTML = orig }, 1500)
      })
    }

    function sanitizeHex(val) {
      return val.trim().replace(/[.\-:]/g, '')
    }

    convertBtn.onclick = () => applyConversion(sanitizeHex(hexInput.value))

    hexInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') applyConversion(sanitizeHex(hexInput.value))
    })

    startBtn.onclick = async () => {
      if ('NDEFReader' in window) {
        try {
          const ndef = new NDEFReader()
          await ndef.scan()

          statusEl.innerText = "Aguardando leitura..."

          ndef.onreading = event => {
            const uidHex = event.serialNumber.replace(/:/g, '').toUpperCase()

            const { reversed, decimal } = convertToSoapAdmin(uidHex)

            hexEl.innerText = uidHex
            reversedEl.innerText = reversed
            decimalEl.innerText = decimal.toString().padStart(10, '0')
            copyBtn.classList.remove('hidden')

            statusEl.innerText = "Cartão lido com sucesso!"
          }

        } catch (error) {
          statusEl.innerText = "Erro: " + error
        }
      } else {
        statusEl.innerText = "Web NFC não suportado neste dispositivo."
      }
    }
  </script>

</body>
</html>
